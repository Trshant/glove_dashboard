<!doctype html>
<html>
    <head>
        <!--
      <link
  rel="stylesheet"
  href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css"
/><script src="https://unpkg.com/htmx.org@1.9.11" integrity="sha384-0gxUXCCR8yv9FM2b+U3FDbsKthCI66oH5IA9fHppQq9DDMHuMauqq1ZHBpJxQ0J0" crossorigin="anonymous"></script>
      -->
        <link rel="stylesheet" href="./static/pico.min.css" />
        <script
            src="./static/htmx.org@1.9.js"
            integrity="sha384-0gxUXCCR8yv9FM2b+U3FDbsKthCI66oH5IA9fHppQq9DDMHuMauqq1ZHBpJxQ0J0"
            crossorigin="anonymous"
        ></script>

        <style>
            header,
            footer {
                padding: 2px;
            }
            tbody {
                display: block;
                height: 250px;
                overflow: auto;
            }
            thead,
            tbody tr {
                display: table;
                width: 100%;
                table-layout: fixed; /* even columns width , fix width of table too*/
            }
            thead {
                width: calc(
                    100% - 1em
                ); /* scrollbar is average 1em/16px width, remove it from thead width */
            }
            tbody {
                -webkit-transition: all 0.3s ease-in-out;
                -moz-transition: all 0.3s ease-in-out;
                -o-transition: all 0.3s ease-in-out;
                -ms-transition: all 0.3s ease-in-out;
                transition: all 0.3s ease-in-out;
            }

            tbody:hover {
                /* Increase length on hover for example */
                height: 650px; /* new height */
            }
        </style>
    </head>
    <body>
        <header>Glove-Elastic Tool</header>
        <main class="container">
            <form
                id="form"
                hx-encoding="multipart/form-data"
                hx-post="/uploadfile/"
            >
                <input type="file" name="file" />
                <button>Upload</button>
                <progress id="progress" value="0" max="100"></progress>
            </form>
            <script>
                htmx.on("#form", "htmx:xhr:progress", function (evt) {
                    htmx.find("#progress").setAttribute(
                        "value",
                        (evt.detail.loaded / evt.detail.total) * 100,
                    );
                });
            </script>
            <form hx-post="/analyze_terms" hx-target="#response">
                <!--hx-indicator="#indicator"-->
                <fieldset role="group">
                    <input
                        type="text"
                        placeholder="Starting Term"
                        name="name"
                    />
                    <input type="hidden" value="3" name="open" />
                    <input type="submit" value="Analyze" />
                </fieldset>
            </form>
            <div id="response"></div>
        </main>
        <footer>Tall-Gruber AS</footer>
        <script>
            document
                .querySelector("#response")
                .addEventListener("click", (e) => {
                    if (event.target.classList.contains("cbox")) {
                        let data_point = e.target.dataset.id;
                        let checkboxes = document.querySelectorAll(
                            '[data-id="' + data_point + '"]',
                        );
                        for (const c of checkboxes) {
                            if (c !== e.target) {
                                c.checked = false;
                            }
                        }
                    }
                });
        </script>
    </body>
</html>
