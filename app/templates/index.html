<html>

      <style>
        header , footer {
            padding: 2px;
        }
      </style>
    </head>
  <body>
    <header>Glove-Elastic Tool
    </header>
    <main class="container">
        <form hx-post="/submit-form" hx-target="#response" > <!--hx-indicator="#indicator"--> 
            <fieldset role="group">
                <input type="text" placeholder="Starting Term" name="name" />
                <input type="submit" value="Analyze" />
            </fieldset>
        </form>
        <div id="response"></div>
    </main>
    <footer>Tall-Gruber AS</footer>
    <script>
        document.querySelector('#response').addEventListener('click', (e) => {

            if (event.target.classList.contains('cbox')) {

                let data_point = e.target.dataset.id;
                let checkboxes = document.querySelectorAll('[data-id="'+data_point+'"]')
                for (const c of checkboxes) {
                    if (c !== e.target ){ 
                        c.checked = false;
                    }
                }
            }
        });
      </script>
  </body>
</html>
