<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Semantic Search</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@1/css/pico.min.css">
    <script src="https://unpkg.com/htmx.org@1.9.11"></script>
</head>
<body>
<main class="container">
    <h1>Semantic Search</h1>
    <form>
        <label for="name">Enter a term:</label>
        <input type="text" id="name" name="name" placeholder="e.g. good"
               hx-post="/submit-form" hx-target="#response" hx-trigger="keyup changed delay:500ms">
    </form>
    <div id="response"></div>
    <div id="search_results"></div>
</main>
<script>
document.body.addEventListener('click', function(evt) {
    if (!evt.target.classList.contains('cbox')) return;
    var dataId = evt.target.getAttribute('data-id');
    var boxes = document.querySelectorAll('.cbox[data-id="' + dataId + '"]');
    boxes.forEach(function(box) {
        if (box !== evt.target) box.checked = false;
    });
});
</script>
</body>
</html>
